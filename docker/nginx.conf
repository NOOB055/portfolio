server {
	listen 80;
	root /usr/share/nginx/html;
	index index.html;

	error_page 404 /404.html;

	gzip on;
	gzip_types text/css application/javascript image/svg+xml application/json text/plain application/xml application/rss+xml;

	add_header X-Content-Type-Options nosniff always;
	add_header X-Frame-Options DENY always;
	add_header Referrer-Policy strict-origin-when-cross-origin always;

	# Hashed assets are immutable; add_header here replaces the inherited
	# set (nginx inheritance rule), so nosniff is restated deliberately.
	location /_astro/ {
		add_header Cache-Control "public, max-age=31536000, immutable" always;
		add_header X-Content-Type-Options nosniff always;
	}

	location / {
		try_files $uri $uri/ $uri.html =404;
	}
}
