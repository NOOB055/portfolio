server {
	listen 80;
	root /usr/share/nginx/html;
	index index.html;

	error_page 404 /404.html;

	gzip on;
	gzip_types text/css application/javascript image/svg+xml application/json text/plain application/xml application/rss+xml;

	# --- Security headers --------------------------------------------------
	# These mirror the Cloudflare `public/_headers` set so the homelab
	# (container) deploy is hardened identically to the edge deploy.
	# The CSP's script hashes must match scripts/csp-hashes.mjs output:
	# regenerate (npm run build) and copy the script-src hashes here if the
	# inline scripts in BaseLayout/ThemeToggle ever change. nginx drops all
	# inherited add_header directives the moment a location sets its own, so
	# every header is restated in the /_astro/ block below — do not remove.
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	add_header X-Content-Type-Options nosniff always;
	add_header X-Frame-Options DENY always;
	add_header Referrer-Policy strict-origin-when-cross-origin always;
	add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
	add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-9E8ear9czoKQFMbodHzyO8/yNiB4SIQ1hVcSc3Ho4XA=' 'sha256-F/f4GVzEBqPb+xiapIhalp0LN/nwppH4Pw4fjBgMWxU='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

	location /_astro/ {
		# A location with its own add_header drops every inherited one, so
		# the full security set is restated here alongside the cache policy.
		add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
		add_header X-Content-Type-Options nosniff always;
		add_header X-Frame-Options DENY always;
		add_header Referrer-Policy strict-origin-when-cross-origin always;
		add_header Cache-Control "public, max-age=31536000, immutable" always;
	}

	location / {
		try_files $uri $uri/ $uri.html =404;
	}
}
