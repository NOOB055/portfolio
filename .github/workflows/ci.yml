name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: quality gates only read the repo.
permissions:
  contents: read

# Superseded runs on the same ref are wasted compute — cancel them.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs: tags are mutable, SHAs are not.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro check
      - run: npm run build
